services:
  postgres:
    image: postgres:15
    container_name: master_db
    shm_size: "256mb"
    command: ["postgres", "-c", "max_parallel_workers_per_gather=0", "-c", "max_parallel_workers=0"]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: shop
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data   
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d shop"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongodb:
    image: mongo:6
    container_name: replica_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db               
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.runCommand({ ping: 1 }).ok\" | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  etl:
    build:
      context: .
      dockerfile: etl_service/Dockerfile
    container_name: etl_service
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DB: shop
      PG_USER: admin
      PG_PASSWORD: secret
      MONGO_URI: mongodb://mongodb:27017/
      MONGO_DB: replica_db
      CRON_SCHEDULE: "*/1 * * * *"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data: